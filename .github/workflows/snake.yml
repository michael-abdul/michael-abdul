name: Generate Snake Animation

on:
  # Har 24 soatda avtomatik ishga tushadi
  schedule:
    - cron: "0 0 * * *" 
  
  # Manuel ravishda (qo'lda) ishga tushirish imkoniyati
  workflow_dispatch:
  
  # main branchga push bo'lganda ishga tushadi
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # GitHub contribution graphdan ilon o'yini (snake) SVG-sini yaratadi
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Yaratilgan fayllarni 'output' branchiga yuklaydi
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
